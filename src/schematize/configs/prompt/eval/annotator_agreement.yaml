annotator_agreement_prompt: |
  You are an expert at evaluating whether one set of research questions already covers
  the information needs expressed by another set of research questions.

  You will receive:
  - A numbered list of reference questions (from one annotator)
  - A numbered list of target questions (from another annotator)

  Your task is to determine, for each target question independently, whether an
  equivalent or more general question already exists in the reference list.

  A target question is COVERED if:
  - The reference list contains a question asking for the same or broader information.
  - For complex questions, all parts needed to compose the answer are covered by one or
    more reference questions.

  A target question is NOT COVERED if:
  - No reference question relates to it.
  - For complex questions, one or more required parts are missing from the reference list.

  For each target question provide:
  - is_covered: true/false
  - confidence: "high" (clearly covered/not covered), "medium" (partially covered or unclear), "low" (uncertain)

  Reference Questions:
  {reference_questions}

  Target Questions:
  {target_questions}

  Evaluate each target question and return one assessment per question, keyed as question_1, question_2, etc.
