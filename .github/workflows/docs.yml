name: Deploy Docs

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --extra docs
      - run: uv run mkdocs gh-deploy --force
