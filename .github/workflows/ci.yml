name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra scripts

      - name: Lint
        run: uv run ruff check src/schematize tests

      - name: Test
        run: uv run coverage run -m pytest && uv run coverage report -mi

  install-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: uv build --wheel

      - name: Install built wheel with extras
        run: |
          uv venv --python ${{ matrix.python }}
          wheel=$(ls dist/*.whl)
          uv pip install "${wheel}[weaviate,huggingface]"

      - name: Import package and bundled data
        run: |
          uv run --no-project python - <<'PY'
          import schematize
          from schematize.utils.load import load_prompts
          import schematize.retrieval.weaviate
          import schematize.retrieval.huggingface
          assert load_prompts("en", "tax"), "bundled prompts failed to load"
          print("schematize", schematize.__version__, "imported with extras OK")
          PY
