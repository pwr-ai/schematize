questions:
  - Jakie są zmienne (kryteria lub argumenty), które wpłynęły na wysokość zasądzonej kwoty?
  - W jaki sposób powołane przez sąd zmienne (kryteria lub argumenty), wpłynęły na wysokość zasądzonej kwoty?
  - Czy zasądzona przez sąd kwota wynikała z zastosowania przepisów o zadośćuczynieniu pieniężnym? (art. 445 par. 1 Kodeksu Cywilnego lub art. 448 Kodeksu Cywilnego)
  - Czy zasądzona przez sąd kwota wynikała z zastosowania przepisów o odszkodowaniu? (art. 444 Kodeksu Cywilnego)
  - Czy sąd rozpoznając złożoną apelację zmienił wysokość zasądzonej kwoty?
  - Jeżeli sąd rozpoznając złożoną apelację zmienił wysokość zasądzonej kwoty, to na jakie zmienne (kryteria lub argumenty) się powołał?
  - Czy w charakterze pozwanego występował konkretny lekarz, czy podmiot, w którym doszło do błędu medycznego, a może pozwanym był zakład ubezpieczeń?
  - Czy sąd ustalając wysokość zasądzonej kwoty wskazał, że na jej wysokość miało wpływ to, kto był pozwany?
  - Czy sąd uzasadniając wyrok wskazał, że na sposób jego uzasadnienia miało wpływ to, kto był pozwany?
  - Czy sąd uzasadniając wyrok wskazał wprost, że na wysokość zasądzonej kwoty lub sposób uzasadnienia wyroku miało wpływ to, że pozwanym był szpital albo ubezpieczyciel?
  - Jeżeli sąd uzasadniając wyrok wskazał wprost, że na jego treść miało wpływ to, że pozwanym był szpital lub ubezpieczyciel, to w jaki sposób wpłynęło to na treść wyroku?
  - Czy w sprawie został przeprowadzony dowód z opinii biegłego?
  - Czy sąd uzasadniając wyrok wskazał, że nie zgadza się w jakimkolwiek zakresie z opinią biegłego?
  - Czy sąd zasądzając kwotę na rzecz pacjenta oparł się na ustalonym przez biegłego procentowym uszczerbku na zdrowiu?
  - Czy sąd, zasądzając kwotę na rzecz pacjenta, przyjął własne, odrębne od biegłego, kryteria ustalenia wysokości zasądzonej kwoty?
  - Czy sąd odwoławczy, zmieniając wyrok sądu I instancji, wskazał że przyczyną zmiany wyroku sądu I instancji jest przyjęcie przez ten sąd innego procentowego uszczerbku na zdrowiu, niż ten ustalony przez biegłego?
  - Jakie okoliczności (związane z pacjentem) zostały podane przez sąd jako mające wpływ na wysokość zasądzonej kwoty?
  - Czy sąd uzasadniając wysokość zasądzonej kwoty powołał się na wyroki wydane przez inne sądy?
  - Czy sąd wskazał wprost, że na wysokość zasądzonej kwoty miały wpływ wyroki wydane przez inne sądy?
  - Jakie są kategorie błędów medycznych oraz ich skutków, które zostały powołane przez sąd?
